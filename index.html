<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>필즈더클래식 시계 각도 문제 풀이 (초3)</title>
<style>
  :root { --green:#2f8f4e; }
  * { box-sizing: border-box; }
  body { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; color:#222; line-height:1.7; margin:0; background:#fbfdfb; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 32px 18px 80px; }
  h1 { color: var(--green); font-size: 1.5rem; border-bottom: 3px solid var(--green); padding-bottom: 10px; }
  .caption { color:#666; }
  .card {
    display:block; text-decoration:none; color:inherit;
    background:#fff; border:1px solid #d9e7dc; border-radius:14px;
    padding:20px 22px; margin:18px 0; transition:.15s;
  }
  .card:hover { border-color: var(--green); box-shadow:0 4px 14px rgba(47,143,78,.12); transform:translateY(-2px); }
  .card h2 { margin:0 0 6px; color: var(--green); font-size:1.2rem; }
  .card .ans { color:#d98800; font-weight:700; }
  .arrow { float:right; color:#bbb; font-size:1.4rem; }
  footer { margin-top:50px; color:#999; font-size:.85rem; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🕐 필즈더클래식 시계 각도 문제 풀이</h1>
  <p class="caption">숫자가 없는 시계 문제를 초등학교 3학년 눈높이로 쉽게 설명했어요.</p>

  <a class="card" href="21.html">
    <span class="arrow">›</span>
    <h2>21번 문제</h2>
    <div>두 바늘이 이루는 각이 70°일 때, 표시된 각과 시각 구하기</div>
    <div class="ans">정답: 표시된 각 20° · 5시 40분</div>
  </a>

  <a class="card" href="22.html">
    <span class="arrow">›</span>
    <h2>22번 문제</h2>
    <div>(1) 두 바늘 47.5°, (2) 시침과 숫자 11°일 때 시각 구하기</div>
    <div class="ans">정답: (1) 3시 25분 · (2) 3시 38분</div>
  </a>

  <footer>초3 눈높이 수학 풀이 모음</footer>
</div>
